    <script>
        const featureList = document.getElementById("feature-list");
        featureList.innerHTML = [
            {icon: "💳", title: "Personal Accounts", desc: "Manage expenses, income, and transfers. Handle group expenses and income seamlessly."},
            {icon: "🤝", title: "External Accounts", desc: "Track debts and loans with friends. Manage transfers and transactions for people you know."},
            {icon: "📝", title: "Settlement Plans", desc: "Generate smart settlement plans to clear debts efficiently with fewer transactions."},
            {icon: "👥", title: "Groups", desc: "Collaborate on shared assets and trip expenses with real-time group tracking."},
            {icon: "🔒", title: "Offline First", desc: "Runs entirely on local storage. No internet connection needed to track your finances."},
            {icon: "💾", title: "Backup & Restore", desc: "Easily export your data for backups and import it whenever you need to restore."},
            {icon: "📊", title: "Excel Export", desc: "Extract detailed Excel sheets for your accounts to analyze data your way."},
            {icon: "🚫", title: "No Ads", desc: "Enjoy a clean, distraction-free experience with zero advertisements."},
            {icon: "🔄", title: "Templates & Recurrent", desc: "Create templates and set up recurrent transactions to automate your regular expenses."},
            {icon: "🕌", title: "Zakat Calculator", desc: "Calculate your Zakat obligations easily based on your assets and savings."},
            {icon: "🔐", title: "Biometric Login", desc: "Secure your data with fingerprint or face recognition authentication."},
            {icon: "👁", title: "Amount Blur", desc: "Hide sensitive amounts with a blur effect for privacy in public spaces."},
        ].map(f =>
            `<div class="feature-card"><div class="icon-box">${f.icon}</div><h3>${f.title}</h3><p>${f.desc}</p></div>`
        ).join("");
        featureList.innerHTML += featureList.innerHTML;

        const screenshotList = document.getElementById("screenshot-list");
        screenshotList.innerHTML = [
            {src: "public/home.jpg", alt: "Home Screen"},
            {src: "public/transactions.jpg", alt: "Transactions Screen"},
            {src: "public/groups.jpg", alt: "Groups Screen"},
            {src: "public/settings.jpg", alt: "Settings Screen"},
        ].map(s =>
            `<div class="screenshot-item"><img src="${s.src}" alt="${s.alt}"></div>`
        ).join("");
        screenshotList.innerHTML += screenshotList.innerHTML;

        // Swipe/drag support for marquees
        function enableDrag(container, track) {
            let dragging = false, startX, scrollStart;
            function onStart(e) {
                dragging = true;
                container.style.cursor = "grabbing";
                track.style.animation = "none";
                startX = (e.touches ? e.touches[0] : e).clientX;
                scrollStart = container.scrollLeft;
            }
            function onMove(e) {
                if (!dragging) return;
                e.preventDefault();
                container.scrollLeft = scrollStart - ((e.touches ? e.touches[0] : e).clientX - startX);
            }
            function onEnd() {
                if (!dragging) return;
                dragging = false;
                container.style.cursor = "grab";
            }
            container.addEventListener("mousedown", onStart);
            container.addEventListener("mousemove", onMove);
            container.addEventListener("mouseup", onEnd);
            container.addEventListener("mouseleave", onEnd);
            container.addEventListener("touchstart", onStart, {passive: true});
            container.addEventListener("touchmove", onMove, {passive: false});
            container.addEventListener("touchend", onEnd);
        }

        enableDrag(document.querySelector(".feature-marquee"), featureList);
        enableDrag(document.querySelector(".screenshot-marquee"), screenshotList);

        // Smooth scroll for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
